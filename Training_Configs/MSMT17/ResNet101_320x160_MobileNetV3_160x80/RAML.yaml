EXPERIMENT:
  DEVICE_ID: "'0'"
  CUDA_AMP: True

OUTPUT_DIR:
  ROOT_PATH: "./log_Ours/RAML"
  EXPERIMENT_NAME: "MSMT17_RAML_ResNet101_320x160_MobileNetV3_Small_160x80"


DATASETS:
  NAMES: "MSMT17"
  ROOT_DIR: "/root/autodl-tmp/data"


DISTILLER:
  TYPE: "RAML"
  TEACHER_NAME: "ResNet101"
  TEACHER_MODEL_PATH: "./ACD/download_teacher_ckpts/MSMT17_Teachers/MSMT17_ResNet101_320x160_59.26_82.09.pth"
  STUDENT_NAME: "MobileNetV3_Small"
  STUDENT_PRETRAIN_PATH: "./ACD/download_student_ckpts/MSMT17_Students/RAML_MN_32.93_50.94.pth"

  TEACHER_RATIO: 0.3
  TEACHER_ALPHA: 3.0
  TEACHER_BETA: 2.0
  TEACHER_TEMPERATURE: 2
  CROSS_RESOLUTION: True 

RAML:
  LAMBDA1: 0.7482
  LAMBDA2: 0.6778
  KD_WEIGHT: 1.0


INPUT:
  SIZE_TRAIN: [320, 160]
  SIZE_TEST: [320, 160]
  PADDING: 8
  
  STUDENT_SIZE_TRAIN: [160, 80]
  STUDENT_SIZE_TEST: [160, 80] 
  STUDENT_PADDING: 4

  TEACHER_SIZE_TRAIN: [320, 160]
  TEACHER_SIZE_TEST: [320, 160]

  TEACHER_PADDING: 8
  RE_PROB: 0.5


DATALOADER:
  NUM_WORKERS: 16
  NUM_INSTANCE: 6


SOLVER:
  TRAINER: "kd"
  IMS_PER_BATCH: 96
  IMS_DISTILLATION_PER_BATCH: 256
  MAX_EPOCHS: 10
  BASE_LR: 0.01
  UNIMPORTANT_LR_TIMES: 0.05
  LR_DECAY_TYPE: "WarmupCosineAnnealingLR" #"WarmupMultiStepLR"  #WarmupCosineAnnealingLR
  LR_WARMUP_EPOCHS: 0
  LR_WARMUP_FACTOR: 0.1
  LR_DECAY_STEPS: [0] #[30, 60, 90] #[30, 60, 90]
  OPTIMIZER_NAME: "SGD"

  CHECKPOINT_PERIOD: 10


TEST:
  IMS_PER_BATCH: 512
  WEIGHT: 10