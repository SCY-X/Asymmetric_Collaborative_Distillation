EXPERIMENT:
  DEVICE_ID: "'0'"
  CUDA_AMP: True

OUTPUT_DIR:
  ROOT_PATH: "./log/CC"
  EXPERIMENT_NAME: "CUB200_CC_ResNet101_256x256_ResNet18_64x64"


DATASETS:
  NAMES: "CUB200"
  ROOT_DIR: "/XXXX/data"


DISTILLER:
  TYPE: "CC"
  TEACHER_NAME: "ResNet101"
  TEACHER_MODEL_PATH: "./ACD/download_teacher_ckpts/CUB200_Teachers/CUB200_ResNet101_256x256_71.30_81.57.pth"
  STUDENT_NAME: "ResNet18"
  STUDENT_PRETRAIN_PATH: "./ACD/download_student_ckpts/CUB200_Students/CC_36.47_39.13.pth"

  TEACHER_RATIO: 0.3
  TEACHER_ALPHA: 3.0
  TEACHER_BETA: 2.0
