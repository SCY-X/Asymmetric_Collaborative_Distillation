EXPERIMENT:
  DEVICE_ID: "'0'"
  CUDA_AMP: True

OUTPUT_DIR:
  ROOT_PATH: "./log/UGD"
  EXPERIMENT_NAME: "SOP_UGD_ResNet101_384x384_ResNet18_64x64"


DATASETS:
  NAMES: "SOP"
  ROOT_DIR: "XXXX/data"


DISTILLER:
  TYPE: "UGD"
  TEACHER_NAME: "ResNet101" 
  TEACHER_MODEL_PATH: './ACD/download_teacher_ckpts/SOP_Teachers/SOP_ResNet101_384x384_74.48_88.17.pth'
  STUDENT_NAME: "ResNet18"
  STUDENT_PRETRAIN_PATH: "./ACD/download_student_ckpts/SOP_Students/UGD_384x384_47.30_63.13.pth" 
  
  TEACHER_RATIO: 0.3
  TEACHER_ALPHA: 3
  TEACHER_BETA: 2
  TEACHER_TEMPERATURE: 2
  CROSS_RESOLUTION: True 

UGD:
  DISTILLATION_LAYER: 3
  ALPHA: 2.0
  BETA: 0.0
  KD_WEIGHT: 1.0


INPUT:
  SIZE_TRAIN: [384, 384] 
  SIZE_TEST: [384, 384]  
  PADDING: 12
  
  STUDENT_SIZE_TRAIN: [64, 64]
  STUDENT_SIZE_TEST: [64, 64] 
  STUDENT_PADDING: 2

  TEACHER_SIZE_TRAIN: [384, 384] 
  TEACHER_SIZE_TEST: [384, 384]

  TEACHER_PADDING: 12
  RE_PROB: 0.5

DATALOADER:
  NUM_WORKERS: 8
  NUM_INSTANCE: 6

SOLVER:
  TRAINER: "kd"
  IMS_PER_BATCH: 96
  IMS_DISTILLATION_PER_BATCH: 96
  MAX_EPOCHS: 20
  BASE_LR: 0.01
  UNIMPORTANT_LR_TIMES: 0.05
  LR_DECAY_TYPE: "WarmupCosineAnnealingLR" #"WarmupMultiStepLR"  #WarmupCosineAnnealingLR
  LR_WARMUP_EPOCHS: 0
  LR_WARMUP_FACTOR: 0.1
  LR_DECAY_STEPS: [0] #[30, 60, 90] #[30, 60, 90]
  OPTIMIZER_NAME: "SGD"

  CHECKPOINT_PERIOD: 20


TEST:
  IMS_PER_BATCH: 512
  WEIGHT: 20

