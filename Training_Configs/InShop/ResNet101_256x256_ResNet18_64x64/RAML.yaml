EXPERIMENT:
  DEVICE_ID: "'0'"
  CUDA_AMP: True

OUTPUT_DIR:
  ROOT_PATH: "./log/RAML"
  EXPERIMENT_NAME: "InShop_RAML_ResNet101_256x256_ResNet18_64x64"


DATASETS:
  NAMES: "InShop"
  ROOT_DIR: "XXXX/data"


DISTILLER:
  TYPE: "RAML"
  TEACHER_NAME: "ResNet101" 
  TEACHER_MODEL_PATH: './ACD/download_teacher_ckpts/InShop_Teachers/InShop_ResNet101_256x256_81.80_95.25.pth'
  STUDENT_NAME: "ResNet18"
  STUDENT_PRETRAIN_PATH: "./ACD/download_student_ckpts/InShop_Students/RAML_67.18_81.85.pth"

  TEACHER_RATIO: 0.3
  TEACHER_ALPHA: 3
  TEACHER_BETA: 2
  TEACHER_TEMPERATURE: 2
  CROSS_RESOLUTION: True 

RAML:
  LAMBDA1: 0.7482
  LAMBDA2: 0.6778
  KD_WEIGHT: 10.0


INPUT:
  SIZE_TRAIN: [256, 256] 
  SIZE_TEST: [256, 256] 
  PADDING: 8
  
  STUDENT_SIZE_TRAIN: [64, 64]
  STUDENT_SIZE_TEST: [64, 64] 
  STUDENT_PADDING: 2

  TEACHER_SIZE_TRAIN: [256, 256] 
  TEACHER_SIZE_TEST: [256, 256] 

  TEACHER_PADDING: 8
  RE_PROB: 0.5



DATALOADER:
  NUM_WORKERS: 8
  NUM_INSTANCE: 6

SOLVER:
  TRAINER: "kd"
  IMS_PER_BATCH: 96
  IMS_DISTILLATION_PER_BATCH: 256
  MAX_EPOCHS: 20
  BASE_LR: 0.01
  UNIMPORTANT_LR_TIMES: 0.05
  LR_DECAY_TYPE: "WarmupCosineAnnealingLR" #"WarmupMultiStepLR"  #WarmupCosineAnnealingLR
  LR_WARMUP_EPOCHS: 0
  LR_WARMUP_FACTOR: 0.1
  LR_DECAY_STEPS: [0] #[30, 60, 90] #[30, 60, 90]
  OPTIMIZER_NAME: "SGD"

  CHECKPOINT_PERIOD: 20


TEST:
  IMS_PER_BATCH: 512
  WEIGHT: 20

